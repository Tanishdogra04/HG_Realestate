# Render Blueprint - HG Real Estate Full Stack
services:
  # Backend API
  - type: web
    name: hgeaton-api
    runtime: node
    plan: free
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        fromStaticSite:
          name: hgeaton-frontend
          property: url

  # Frontend Dashboard
  - type: static
    name: hgeaton-frontend
    buildCommand: npm install --prefix frontend && npm run build --prefix frontend
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hgeaton-api
          property: url
          suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
