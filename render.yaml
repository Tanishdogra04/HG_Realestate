# Render Blueprint - HG Real Estate Full Stack
services:
  # Backend API
  - type: web
    name: hgeaton-api
    runtime: node
    plan: free # Change to pro for better performance
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false # Set manually in Render dashboard
      - key: CORS_ORIGIN
        fromStaticSite:
          name: hgeaton-frontend
          property: url

  # Frontend Dashboard
  - type: static
    name: hgeaton-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hgeaton-api
          property: url
          suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
